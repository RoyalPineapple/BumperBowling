name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: Swift Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Run Bumper self-lint
        run: swift run bumper lint .
