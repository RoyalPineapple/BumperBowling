name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bumper-tests:
    name: Bumper Tests
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache Bumper runner
        uses: actions/cache@v4
        with:
          path: .bumper-ci-cache
          key: bumper-runner-${{ runner.os }}-${{ hashFiles('BumperBowling.swift', '.bumper/**', 'Sources/**', 'Package.swift') }}
          restore-keys: |
            bumper-runner-${{ runner.os }}-

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint --strict

      - name: Run Swift package tests
        run: swift test
        env:
          # Configuration runners are disposable CI tools. Keep their cold
          # compile out of the optimized path on constrained hosts.
          BUMPER_RUNNER_BUILD_CONFIGURATION: debug

      - name: Run Bumper CLI lint
        run: swift run bumper lint .
        env:
          BUMPER_CACHE_DIR: ${{ github.workspace }}/.bumper-ci-cache
          BUMPER_RUNNER_BUILD_CONFIGURATION: debug
