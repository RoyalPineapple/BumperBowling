name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bumper-tests:
    name: Bumper Tests
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint

      - name: Run Swift package tests
        run: swift test

      - name: Run Bumper CLI lint
        run: swift run bumper lint .
