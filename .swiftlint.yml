included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 800
  error: 1000

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 500

identifier_name:
  excluded:
    - id
    - ui
    - Included
    - Excluded
    - Architecture
    - Assertions
    - Component
    - RequireSyntax
    - DisallowSyntax
    - Owns
    - MayDependOn
    - DoesNotDependOn
    - MayUse
    - DoesNotUse
    - Declare
    - ContainSyntax
    - Does
    - DoesNot
    - Declares
    - Requires
    - RequiresScoped
    - Disallows
    - NoDirectStringMatching
    - DependencyBoundaries
    - SingleOwner
    - AcyclicDeclaredDependencies
    - Paths
    - Modules

reporter: "xcode"
