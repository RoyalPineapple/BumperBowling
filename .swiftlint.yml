included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 500

identifier_name:
  excluded:
    - id

reporter: "xcode"
